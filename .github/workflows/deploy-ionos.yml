name: Deploy to IONOS (SFTP)

# Lädt die statische Seite bei jedem Push auf main automatisch ins IONOS-Webspace.
# Aktiv, sobald die Repository-Secrets gesetzt sind:
#   IONOS_HOST        – SFTP-Host (z. B. accessXXXX.webspace-host.com)
#   IONOS_USER        – SFTP-Benutzername
#   IONOS_PASSWORD    – SFTP-Passwort
#   IONOS_REMOTE_DIR  – Zielordner auf dem Webspace (z. B. "/")
# Ohne Secrets überspringt der Job sich selbst (kein Fehler).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ionos
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check IONOS secrets
        id: cfg
        run: |
          if [ -n "${{ secrets.IONOS_HOST }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::IONOS-Secrets noch nicht gesetzt — Deploy wird übersprungen."
          fi

      - name: Build dist (nur die Website-Dateien)
        if: steps.cfg.outputs.ready == 'true'
        run: |
          mkdir -p dist
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='docs' \
            --exclude='scripts' \
            --exclude='CNAME' \
            --exclude='*.md' \
            ./ dist/
          echo "Dateien im dist/:" && find dist -maxdepth 2 -type f | head -40

      - name: Upload via SFTP
        if: steps.cfg.outputs.ready == 'true'
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          port: 22
          local_path: './dist/*'
          remote_path: ${{ secrets.IONOS_REMOTE_DIR }}
          sftp_only: true

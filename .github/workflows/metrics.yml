name: KPI Metrics (Cloudflare)

# Zieht täglich die Web-Analytics-Zahlen aus Cloudflare in data/metrics.json,
# das vom internen Dashboard (/dashboard.html) angezeigt wird.
#
# EINMALIGE EINRICHTUNG — Repo-Secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   (Recht: Account Analytics: Read)
#   CLOUDFLARE_ACCOUNT_ID
#   CLOUDFLARE_SITE_TAG    (Site-Tag der Web-Analytics-Property)
# Ohne die Secrets läuft der Job durch und schreibt einen Platzhalter (kein Fehler).

on:
  schedule:
    - cron: "30 5 * * *"   # täglich ~05:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: kpi-metrics
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cloudflare-Metriken ziehen
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_SITE_TAG: ${{ secrets.CLOUDFLARE_SITE_TAG }}
        run: python scripts/cloudflare_metrics.py

      - name: metrics.json zurückschreiben
        run: |
          if ! git diff --quiet -- data/metrics.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/metrics.json
            git commit -m "chore(metrics): Cloudflare-KPIs aktualisiert [skip ci]"
            git push
          else
            echo "Keine Änderung an metrics.json."
          fi

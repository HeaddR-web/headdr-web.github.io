name: Pinterest auto-publish

# Posts queued pins to Pinterest on a schedule.
# Reads every */pins/queue.json (cozy/ and girlsnight/), publishes the next
# unpublished pins, marks them published and commits the updated queues back.

on:
  schedule:
    - cron: "0 9 * * *"   # daily ~09:00 UTC
    - cron: "0 17 * * *"  # daily ~17:00 UTC
  workflow_dispatch:       # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write          # needed to commit the updated queue back

concurrency:
  group: pinterest-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish queued pins
        env:
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          PINTEREST_BOARD_ID_GIRLSNIGHT: ${{ secrets.PINTEREST_BOARD_ID_GIRLSNIGHT }}
          MAX_PER_RUN: "2"
        run: python scripts/pinterest_publish.py

      - name: Commit updated queues
        run: |
          if [[ -n "$(git status --porcelain '*/pins/queue.json')" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add */pins/queue.json
            git commit -m "Pinterest: mark published pins [skip ci]"
            git push
          else
            echo "No queue changes to commit."
          fi
